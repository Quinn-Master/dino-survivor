<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dino Survivor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <canvas id="canvas" width="900" height="200" aria-label="Dino Survivor"></canvas>
    <div id="hud">
      <div class="left">
        <button id="skinBtn" type="button">Changer skin</button>
        <button id="restartBtn" type="button">Restart</button>
        <button id="pauseBtn" type="button">Pause</button>
      </div>
      <div class="right">
        <div class="scoreWrap">
          <span id="score">0</span>
          <small id="best">Best: 0</small>
        </div>
      </div>
    </div>
    <div id="overlay" class="hidden">Chargement des assets…</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
