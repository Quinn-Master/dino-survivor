<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="game">
        <div id="startScreen">Appuie sur ESPACE pour commencer</div>
        <div id="scoreBoard">0</div>
        <div id="ground"></div>
        <div id="dino"></div>
        <div id="cactus"></div>
        <div id="bird"></div>
        <div class="cloud"></div>
    </main>

    <audio id="jumpSound" src="jump.mp3"></audio>
    <audio id="runSound" src="run.mp3" loop></audio>
    <audio id="gameOverSound" src="gameover.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
